modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

# Exposes LivingEntity.jumping so hover vehicles read the rider's space key.
[[accessTransformers]]
    file="META-INF/accesstransformer.cfg"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Tom Weeks"
description='''
Comprehensive Star Wars mod: Empire vs Light faction war, blasters,
lightsabers, Force powers, and worldgen structures.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
