license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Tom Weeks"
description='''
Adds a Thief mob that disguises as a villager, steals from chests, and reveals
into a crossbow or blackjack wielder when discovered. Part of the Security Pack.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="securitycore"
    type="required"
    versionRange="[0.1.0,)"
    ordering="AFTER"
    side="BOTH"
